<div class="listpage-left" style="width:180px;">
    <div class="listpage-left-head ">栏目</div>
    <div class="listpage-left-content">
        <ul id="clsBXJGCMSArticle" />
    </div>
</div>
<div class="listpage-right">
    <div id="dgToolbarBXJGCMSArticle" class="datagrid-toolbar1">
        <div class="toolbar_right">
            <!--<input class="easyui-textbox" data-options="width:260, prompt:'名称/助记码/品牌/规格型号/供应商 等...'" />-->
        </div>
    </div>
    <table id="dgBXJGCMSArticle"></table>
</div>
<script>
    (function () {
        //在razor变量两边加单引号会被当成字符串，vs智能提示不会消失
        var m = 'BXJGCMSArticle';
        var canAdd = abp.auth.isGranted(m + 'Create');
        var canUpdate = abp.auth.isGranted(m + 'Update');
        var canDelete = abp.auth.isGranted(m + 'Delete');
        var $toolbar = $('#dgToolbar' + m);
        var $toolbarRight = $toolbar.find('.toolbar_right');
        var $dg = $('#dg' + m);
        var $cmenu = $('<div />');
        var $cls = $('#cls' + m);

        $cmenu.menu();
        if (canAdd) {
            var $btnAdd = $('<a />').insertBefore($toolbarRight);
            var $btnAddOptions = {
                iconCls: 'icon-add',
                text: abp.localization.bxjgUtils('新增')
            };
            $btnAdd.linkbutton($.extend($btnAddOptions, {
                plain: true,
                onClick: function () {
                    showForm();
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnAddOptions, {
                onclick: function () {
                    $btnAdd.trigger('click');
                }
            }));
        }
        if (canUpdate) {
            var $btnUpdate = $('<a />').insertBefore($toolbarRight);
            var $btnUpdateOptions = {
                iconCls: 'icon-edit',
                text: abp.localization.bxjgUtils('修改')
            };
            $btnUpdate.linkbutton($.extend($btnUpdateOptions, {
                plain: true,
                onClick: function () {
                    var rows = getSelected($(this).text());
                    if (!rows)
                        return;
                    showForm(rows[0].id);
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnUpdateOptions, {
                onclick: function () {
                    $btnUpdate.trigger('click');
                }
            }));
        }
        if (canDelete) {
            var $btnDelete = $('<a />').insertBefore($toolbarRight);
            var $btnDeleteOptions = {
                iconCls: 'icon-remove',
                text: abp.localization.bxjgUtils('删除')
            };
            $btnDelete.linkbutton($.extend($btnDeleteOptions, {
                plain: true,
                onClick: function () {
                    var rows = getSelected($(this).text());
                    if (!rows)
                        return;
                    abp.message.confirm(
                        abp.localization.bxjgUtils('DeleteConfirm'),
                        abp.localization.bxjgUtils('DeleteConfirmPropt'),
                        function (isConfirmed) {
                            if (isConfirmed) {
                                var ary = new Array();
                                $(rows).each(function () {
                                    ary.push(this.id);
                                });
                                abp.ui.setBusy(null, abp.services.app[abp.utils.toCamelCase(m)].deleteBatch(ary).done(function (d) {
                                    abp.notify.success(abp.localization.bxjgUtils('Delete') + abp.localization.bxjgUtils('Success') + '!');
                                    $btnRefresh.trigger('click');
                                }));
                            }
                        }
                    );
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnDeleteOptions, {
                onclick: function () {
                    $btnDelete.trigger('click');
                }
            }));
        }

        var $btnRefresh = $('<a />').insertBefore($toolbarRight);
        $btnRefresh.linkbutton({
            iconCls: 'icon-reload',
            text: abp.localization.bxjgUtils('刷新'),
            plain: true,
            onClick: function () {
                $dg.datagrid('reload');
            }
        });

        var $keywordTextbox = $('<input />').appendTo($toolbarRight);
        $keywordTextbox.textbox({
            width: 200,
            prompt: abp.localization.bxjgCMS('GetBXJGCMSArticleKeywordsInputPrompt'),
            onChange: search
        });
        var $publishedCombobox = $('<input />').appendTo($toolbarRight);
        $publishedCombobox.combobox({
            editable: false,
            width: 130,
            prompt: '==发布状态==',
            data: [
                { displayText: '==发布状态==', value: null },
                { displayText: '已发布', value: 'true' },
                { displayText: '未发布', value: 'false' }],
            onChange: search
        });
        var $startDate = $('<input />').appendTo($toolbarRight);
        $startDate.datebox({
            prompt: '发布开始日期',
            width:120,
            onChange: search
        });
        var $endDate = $('<input />').appendTo($toolbarRight);
        $endDate.datebox({
            prompt: '发布结束日期',
            width: 120,
            onChange: search
        });
        function search() {
            var data = {};
            var keywords = $keywordTextbox.textbox('getValue');
            if (keywords)
                data.keywords = keywords;
            var published = $publishedCombobox.combobox('getValue');
            if (published )
                data.published = published;
            var startDate = $startDate.datebox('getValue');
            if (startDate)
                data.publishStartTime = startDate;
            var endDate = $endDate.datebox('getValue');
            if (endDate)
                data.publishEndTime = endDate;
            $dg.datagrid('load', data);
        }

        $cls.tree({
            url: abp.appPath + 'api/services/app/BXJGCMSColumn/GetTreeForSelect',
            queryParams: {
                forType: 1,
                //ParentId: 1,
                ParentText: "全部"
            },//?ParentId=21&ForType=1&ParentText=全部分类
            onSelect: function (node) {
                let loadAllParameter = {};
                if (node.id)
                    loadAllParameter.columnCode = node.code;
                $dg.datagrid('load', loadAllParameter);
            }
        });

        //str:删除 审核，注意本地化
        function getSelected(str) {
            var rows = $dg.datagrid('getSelections');
            if (rows.length == 0) {//若没有选择，返回的是一个空数组，而非undifined/null
                abp.message.warn(abp.localization.bxjgUtils('PleaseSeleteLines', $.trim(str)));
                return false;
            }
            return rows;
        }
        //只有新增和修改会使用编辑表单页面，批量审核或其它需要表单的操作应该另外定义方法而不是高度抽象一个表单窗口
        //em：编辑时的id 若不传则新增
        function showForm(id) {
            var $dlg = $('<div id="dlg' + m + '" />');
            if (id)
                $dlg.data('id', id);

            var clsSeclected = $cls.tree('getSelected');
            if (clsSeclected)
                $dlg.data('clsId', clsSeclected.id);

            $dlg.data('onAdded', function () {
                $dlg.dialog('close');
                $dg.datagrid('load');
            });
            $dlg.data('onUpdated', function () {
                $dlg.dialog('close');
                $dg.datagrid('reload');
            });

            $dlg.dialog({
                iconCls: id ? $btnUpdateOptions.iconCls : $btnAddOptions.iconCls,
                title: (id ? $btnUpdateOptions.text : $btnAddOptions.text) + '文章',//abp.localization.BXJGCMSShop(m),
                width: 850,
                height: 650,
                border: false,
                modal: true,
                href: '/BXJGCMS/' + m + '/form.html?_t=' + abp.pageLoadTime.getTime(),
                buttons: [{
                    iconCls: 'icon-ok',
                    text: abp.localization.zlj('Save'),
                    handler: function () {
                        var callback = $dlg.data('clickSave');
                        if (callback)
                            callback();
                    }
                }, {
                    iconCls: 'icon-undo',
                    text: abp.localization.zlj('Back'),
                    handler: function () {
                        $dlg.dialog('close');
                    }
                }],
                onClose: function () {
                    $dlg.dialog('destroy');
                }
                //可以通过onload事件初始化控件，如：下拉框
            });
        }

        $dg.datagrid({
            ctrlSelect: true,
            fit: true,
            checkOnSelect: true,
            selectOnCheck: true,
            singleSelect: false,
            border: false,
            showFooter1: true,
            rownumbers: true,
            pagination: true,
            //nowrap: false,           
            toolbar: '#dgToolbar' + m,
            //striped:true,
            ///api/services/app/BXJGCMSArticle/GetAll
            url: abp.appPath + 'api/services/app/BXJGCMSArticle/GetAll',
            queryParams: {
                //"CategoryId": 1,
                //"Published": true
            },
            frozenColumns: [[
                { field: 'ck', checkbox: true },
                { field: 'title', title: '标题', width:300, sortable: true }
            ]],
            columns: [[
                { field: 'columnDisplayName', title: '所属栏目',width:100 }
            ]],
            onRowContextMenu: function (e, index, row) {
                if (!row)
                    return;
                e.preventDefault();//禁止浏览器默认右键菜单
                //可以在这里临时创建右键菜单，则可以通过闭包访问row
                var rows = $dg.datagrid('getSelections');
                if (rows.length == 1)
                    $dg.datagrid('clearSelections')
                $dg.datagrid('selectRow', index);
                $cmenu.menu('show', {
                    left: e.pageX,
                    top: e.pageY
                });
            },
            onDblClickRow: function (index, row) {
                if ($btnUpdate)
                    $btnUpdate.trigger('click');
            }
        });

    }());
</script>
