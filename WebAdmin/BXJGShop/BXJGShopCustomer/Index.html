<div id="dgToolbarBXJGShopCustomer" class="datagrid-toolbar1">
    <div class="toolbar_right">
    </div>
</div>
<table id="dgBXJGShopCustomer"></table>

<script>
    (function () {
        //若在js函数内部直接使用 razor变量，将失去vs2017提供的js代码折叠效果，因此这里搞个变量
        var m = 'BXJGShopCustomer';

        var canAdd = abp.auth.isGranted(m + 'Create');
        var canUpdate = abp.auth.isGranted( m + 'Update');
        var canDelete = abp.auth.isGranted( m + 'Delete');

        var $toolbar = $('#dgToolbar' + m);
        var $toolbarRight = $toolbar.find('.toolbar_right');
        var $dg = $('#dg' + m);
        var $cmenu = $('<div />');

        $cmenu.menu();
        if (canAdd) {
            var $btnAdd = $('<a />').insertBefore($toolbarRight);
            var $btnAddOptions = {
                iconCls: 'icon-add',
                text: abp.localization.zlj('Add')
            };
            $btnAdd.linkbutton($.extend($btnAddOptions, {
                plain: true,
                onClick: function () {
                    showForm();
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnAddOptions, {
                onclick: function () {
                    $btnAdd.trigger('click');
                }
            }));
        }
        if (canUpdate) {
            var $btnUpdate = $('<a />').insertBefore($toolbarRight);
            var $btnUpdateOptions = {
                iconCls: 'icon-edit',
                text: abp.localization.zlj('Update')
            };
            $btnUpdate.linkbutton($.extend($btnUpdateOptions, {
                plain: true,
                onClick: function () {
                    var rows = getSelected($(this).text());
                    if (!rows)
                        return;
                    showForm(rows[0].id);
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnUpdateOptions, {
                onclick: function () {
                    $btnUpdate.trigger('click');
                }
            }));
        }
        if (canDelete) {
            var $btnDelete = $('<a />').insertBefore($toolbarRight);
            var $btnDeleteOptions = {
                iconCls: 'icon-remove',
                text: abp.localization.zlj('Delete')
            };
            $btnDelete.linkbutton($.extend($btnDeleteOptions, {
                plain: true,
                onClick: function () {
                    var rows = getSelected($(this).text());
                    if (!rows)
                        return;
                    abp.message.confirm(
                        abp.localization.zlj('DeleteConfirm'),
                        abp.localization.zlj('DeleteConfirmPropt'),
                        function (isConfirmed) {
                            if (isConfirmed) {
                                var ary = new Array();
                                $(rows).each(function () {
                                    ary.push(this.id);
                                });
                                abp.ui.setBusy(null, abp.services.app[abp.utils.toCamelCase(m)].deleteBatch(ary).done(function (d) {
                                    abp.notify.success(abp.localization.zlj('Delete') + abp.localization.zlj('Success') + '!');
                                    $btnRefresh.trigger('click');
                                }));
                            }
                        }
                    );
                }
            }));
            $cmenu.menu('appendItem', $.extend($btnDeleteOptions, {
                onclick: function () {
                    $btnDelete.trigger('click');
                }
            }));
        }

        var $btnRefresh = $('<a />').insertBefore($toolbarRight);
        $btnRefresh.linkbutton({
            iconCls: 'icon-reload',
            text: abp.localization.zlj('Refresh'),
            plain: true,
            onClick: function () {
                $dg.datagrid('reload');
            }
        });

        var $keywordTextbox = $('<input />').appendTo($toolbarRight);
        $keywordTextbox.textbox({
            width: 200,
            prompt: abp.localization.zlj('GetUsersKeywordsInputPrompt'),
            onChange: search
        });

        var $roleCombobox = $('<input />').appendTo($toolbarRight);
        $roleCombobox.combotree({
            editable: false,
            width:170,
            url: abp.appPath + 'api/services/app/Administrative/GettreeForSelect',
            queryParams: {  forType: 4},
            prompt1: '==角色==',
            onChange: search
        });
        function search() {
            var data = {};
            var keywords = $keywordTextbox.textbox('getValue');
            if (keywords)
                data.keywords = keywords;
            var roleId = $roleCombobox.combotree('getValue');
            if (roleId)
                data.roleId = roleId;
            $dg.datagrid('load', data);
        }

        //str:删除 审核，注意本地化
        function getSelected(str) {
            var rows = $dg.datagrid('getSelections');
            if (rows.length == 0) {//若没有选择，返回的是一个空数组，而非undifined/null
                abp.message.warn(abp.localization.zlj('PleaseSeleteLines', $.trim(str)));
                return false;
            }
            return rows;
        }
        //只有新增和修改会使用编辑表单页面，批量审核或其它需要表单的操作应该另外定义方法而不是高度抽象一个表单窗口
        //em：编辑时的id 若不传则新增
        function showForm(id) {
            var $dlg = $('<div id="dlg' + m + '" />');
            if (id)
                $dlg.data('id', id);

            $dlg.data('onAdded', function () {
                $dlg.dialog('close');
                $dg.datagrid('load');
            });
            $dlg.data('onUpdated', function () {
                $dlg.dialog('close');
                $dg.datagrid('reload');
            });

            $dlg.dialog({
                iconCls: id ? $btnUpdateOptions.iconCls : $btnAddOptions.iconCls,
                title: (id ? $btnUpdateOptions.text : $btnAddOptions.text) + abp.localization.zlj(m),
                width: 880,
                height: 500,
                border: false,
                modal: true,
                href: '/BXJGShop/' + m + '/form.html?_t=' + abp.pageLoadTime.getTime(),
                buttons: [{
                    iconCls: 'icon-ok',
                    text: abp.localization.zlj('Save'),
                    handler: function () {
                        var callback = $dlg.data('clickSave');
                        if (callback)
                            callback();
                    }
                }, {
                    iconCls: 'icon-undo',
                    text: abp.localization.zlj('Back'),
                    handler: function () {
                        $dlg.dialog('close');
                    }
                }],
                onClose: function () {
                    $dlg.dialog('destroy');
                }
                //可以通过onload事件初始化控件，如：下拉框
            });
        }


        $dg.datagrid({
            ctrlSelect: true,
            fit: true,
            pagination: false,
            checkOnSelect:true,
            selectOnCheck:true,
            singleSelect:false,
            border: false,
            showFooter1: true,
            rownumbers: true,
            pagination: true,
            toolbar: '#dgToolbar'+m,
            url: abp.appPath + 'api/services/app/'+m+'/getlist',
            columns: [[
                { field: 'phoneNumber', title: '手机号' },
                { field: 'userEmailAddress', title: '邮箱地址'},
                { field: 'genderText', title: '性别',align:'center' },
                { field: 'birthday', title: '出生年月', sortable: true },
                { field: 'areaDisplayName', title: '所属区域',sortable: true },
                { field: 'integral', title: '积分',  align:'right', sortable: true },
                { field: 'amount', title: '消费金额',  align:'right', sortable: true },
                { field: 'userIsActive', title: '激活',align:'center',formatter:abp.easyui.datagridBool   }
            ]],
            frozenColumns: [[
                { field: 'ck', checkbox: true },
                { field: 'userUserName', title: '登录名' }
            ]],
            onRowContextMenu: function (e, index, row) {
                if (!row)
                    return;
                e.preventDefault();//禁止浏览器默认右键菜单
                //可以在这里临时创建右键菜单，则可以通过闭包访问row
                var rows = $dg.datagrid('getSelections');
                if (rows.length == 1)
                    $dg.datagrid('clearSelections')
                $dg.datagrid('selectRow', index);
                $cmenu.menu('show', {
                    left: e.pageX,
                    top: e.pageY
                });
            },
            onDblClickRow: function (index, row) {
                if ($btnUpdate)
                    $btnUpdate.trigger('click');
            }
        });
     }());
</script>
