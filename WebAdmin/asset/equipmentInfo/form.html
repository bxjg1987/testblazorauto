<form id="frmEquipmentInfo">
    <input type="hidden" name="id" value="0" />
    <table class="frm-box column2">
        <tr>
            <th>名称</th>
            <td colspan="3"><input name="name" class="easyui-textbox" data-options=" required:true, validType:'length[1,100]'" style="width:468px" /></td>
        </tr>
        <tr>
            <th>类别</th>
            <td>
                <input name="categoryId" class="easyui-combotree"
                       data-options="
                       editable:false,
                       required:true,
                       url:abp.appPath+'/api/services/app/dataDictionary/GettreeForSelect',
                       queryParams: { forType: 4,id:5}" />
            </td>
            <th>助记码</th>
            <td><input name="mnemonicCode" class="easyui-textbox" data-options="validType:'length[0,100]'" /></td>
        </tr>
        <tr>
            <th>单位</th>
            <td>
                <input name="unitId" class="easyui-combobox"
                       data-options="
                       url:abp.appPath+'/api/services/app/dataDictionary/GetNodesForSelect',
                       queryParams: { forType: 4,id:6}" />
            </td>
            <th>规格型号</th>
            <td><input name="size" class="easyui-textbox" data-options="validType:'length[0,100]'" /></td>
        </tr>
        <tr>
            <th>品牌</th>
            <td>
                <input name="brandId" class="easyui-combobox "
                       data-options="
                       url:abp.appPath+'/api/services/app/dataDictionary/GetNodesForSelect',
                       queryParams: { forType: 4,id:7}" />
            </td>
            <!--<th>供应商</th>
            <td>
                <select class="easyui-combogrid" name="supplierId"
                        data-options="
                                panelWidth:700,
                                idField:'id',
                                textField:'name',
                                prompt:'请选择(支持按名称/联系人/手机号/地址等模糊查询)',
                                url:'/api/services/app/btype/GetForSelect',
                                queryParams1: { forType: 2,id:71},

                                    {field:'address',title:'地址',width:100},
                                    {field:'remark',title:'备注',width:100}
                                ]]
                            "></select>
            </td>-->
            <td></td>
        </tr>
        <!--<tr>
            <th>进价</th>
            <td><input name="purchasePrice" class="easyui-numberspinner" data-options="prefix:'￥',precision:2,value:0" /></td>
            <th>售价</th>
            <td><input name="sellPrice" class="easyui-numberspinner" data-options="prefix:'￥',precision:2,value:0" /></td>
        </tr>-->
        <tr>
            <th class="top">附件</th>
            <td colspan="3" class="attachment" style="height:260px;"></td>
        </tr>
    </table>
</form>
<script>
    (function () {
        let m = 'EquipmentInfo';
        let $dlg = $('#dlg' + m);
        let $frm = $dlg.find('form');
        let id = $dlg.data('id');
        let $name = $frm.find('[name="name"]');
        let $mnemonicCode = $frm.find('[name="mnemonicCode"]');
        let $cls = $frm.find('[name="categoryId"]');
        let $brand = $frm.find('[name="brand"]');
        let $unit = $frm.find('[name="unit"]');
        let attachment = $frm.find('.attachment');

        attachment.jqEasyuiWebuploader(abp.file.buildJQUOA('EquipmentInfo', 'Administrator.Asset.EquipmentInfo.Create', 'Administrator.Asset.EquipmentInfo'));
        let up = attachment.jqEasyuiWebuploader('webUploader');
        //let uploaderInitTask = attachment.jqEasyuiWebuploader('initTask');
        setTimeout(function () {
            $name.next('span').find('input').focus();
            var $realName = $frm.find('[name="name"]').prev();  //这里必须直接通过jquery做选择
            $realName.focus().blur(function () {
                var input = $name.val();
                if (!input)
                    return;
                if ($mnemonicCode.val())
                    return;
                abp.services.app.utils.getPY({ chinese: input }).done(function (d) {
                    $mnemonicCode.textbox('setValue', d);
                });
            });
        }, 0);

        function save(postData) {
            var defer;
            if (id) {
                defer = abp.services.app.equipmentInfo.update(postData).done(function (d) {
                    abp.notify.success(abp.localization.zlj('Update') + abp.localization.zlj('Success') + '!');
                    onSaved('onUpdated');
                });
            } else {
                defer = abp.services.app.equipmentInfo.create(postData).done(function (d) {
                    abp.notify.success(abp.localization.zlj('Add') + abp.localization.zlj('Success') + '!');
                    onSaved('onAdded');
                });
            }
            abp.ui.setBusy($dlg, defer);
        }
        $dlg.data('clickSave', function () {

            if (!$frm.form('validate'))
                return;

            var postData = $frm.serializeJSON();

            //处理附件
            var jjjc = attachment.jqEasyuiWebuploader('checkSaveOrGetFileIds');
            postData.attachments = jjjc.data;

            if (!jjjc.success) {

                abp.message.confirm(
                    abp.localization.zlj('附件未上传完成，将只保存已上传的附件，是否继续保存？'),
                    abp.localization.zlj('附件检查'),
                    function (isConfirmed) {
                        if (isConfirmed) {
                            save(postData);
                        }
                    }
                );

            } else {
                save(postData);
            }

        });

        if (id) {
            abp.ui.setBusy($dlg, abp.services.app.equipmentInfo.get({ id: id }).done(function (d) {
                $frm.form('load', d);
                if (d.attachments) {
                    //插件有点问题，初始化有部分东西是异步的，因此这里等一段时间
                    //保险的方式是插件提供初始化完成的回调函数
                     setTimeout(function () {
                        d.attachments.forEach(function (item, index) {
                            var obj = {
                                id: item.id,//这个好像也没什么卵用
                                name: item.name,
                                ext: item.extension.substring(1),//这行貌似没什么卵用，webuploader取文件名后缀
                                size: item.size
                            };
                            var file = new WebUploader.File(obj);
                            file.myData = file.myData || {};
                            file.myData.serverFileId = item.id;
                            file.myData.attachmentId = item.attachmentId;
                            file.setStatus('complete');
                            up.addFiles(file);
                        });
                    },500);
                }
            }));
        } else
            $cls.val($dlg.data('clsId'));//直接用val赋值，easyui初始化后会直接使用这个值初始化对应的控件

        function onSaved(funcName) {
            var f = $dlg.data(funcName);
            if (f)
                f();
        }
    })();
</script>
