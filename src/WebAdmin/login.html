<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <!--<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">-->
    <link href="https://cdn.bootcss.com/twitter-bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
    <!-- Loding font -->
    <!--<link href="https://fonts.googleapis.com/css?family=Montserrat:300,700" rel="stylesheet">-->
    <!-- Custom Styles -->
    <link rel="stylesheet" type="text/css" href="css/login.css">

    <title>Login</title>
</head>
<body>

    <!-- Backgrounds -->

    <div id="login-bg" class="container-fluid">

        <div class="bg-img"></div>
        <div class="bg-color"></div>
    </div>

    <!-- End Backgrounds -->

    <div class="container" id="login">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="login">

                    <h1>用户登录</h1>

                    <!-- Loging form -->
                    <form>
                        <div class="form-group">
                            <input type1="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="登录名/邮箱地址">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" id="exampleInputPassword1" placeholder="密码">
                        </div>

                        <div class="form-check">

                            <label class="switch">
                                <input type="checkbox">
                                <span class="slider round"></span>
                            </label>
                            <label class="form-check-label" for="exampleCheck1">记住账号密码</label>

                            <label class="forgot-password"><a href="#">忘记密码?<a></label>

                        </div>

                        <br>
                        <button type="submit" class="btn btn-lg btn-block btn-primary">登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
